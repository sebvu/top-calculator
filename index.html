<!doctype html>

<html lang="en">
  <head>
    <title>TOP Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="calculator-container">
      <div id="calculator-display-container">
        <span>display text</span>
      </div>

      <div id="calculator-btn-container">
        <!-- header util operators -->
        <div id="header-operators">
          <div id="logo">
            <h1>sebvu</h1>
          </div>
          <div id="utility-container">
            <button id="equal-operator">=</button>
            <button id="sign-switch-operator">+/-</button>
            <button id="pop-operator">POP</button>
            <button id="clear-operator">CLEAR</button>
          </div>
        </div>
        <div id="ops-container">
            <!-- numbers -->
            <button class="double">.</button>
            <button>0</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <!-- operations -->
            <button>+</button>
            <button>-</button>
            <button>*</button>
            <button>/</button>
            <button>^</button>
            <button>%</button>
        </div>
      </div>
    </div>
  </body>
</html>
