<doctype html>
  <html lang="en">
    <head>
      <title>TOP Calculator</title>
      <script src="script.js" defer></script>
      <link rel="stylesheet" href="style.css" />
    </head>

    <body>
      <div id="calculator-container">
        <div id="calculator-display">
          <span>display</span>
        </div>

        <div id="calculator-operators-body">
          <button id="add-operator">+</button>
          <button id="subtract-operator">-</button>
          <button id="multiply-operator">*</button>
          <button id="divide-operator">/</button>
          <button id="equal-operator">=</button>
          <button id="clear-operator">clear</button>
        </div>
      </div>
    </body>
  </html>
</doctype>
